# Cognibrew Applications
x-fastapi-common: &fastapi-common
  platform: linux/amd64
  restart: unless-stopped
  networks:
    - cognibrew-cloud

services:
  edge-gateway:
    image: teetinnapop/actions:cognibrew-cloud-edge-gateway-latest
    container_name: cognibrew-edge-gateway
    <<: *fastapi-common
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      API_PREFIX_STR: /api/v1
      PROJECT_NAME: CogniBrew Edge Gateway
      S3_ENDPOINT_URL: http://rustfs:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-rustfsadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-rustfsadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cognibrew-raw}

  vector-operation:
    image: teetinnapop/actions:cognibrew-cloud-vector-operation-latest
    container_name: cognibrew-vector-operation
    <<: *fastapi-common
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      API_PREFIX_STR: /api/v1
      PROJECT_NAME: CogniBrew Vector Operation
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6334}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-face_embeddings}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-512}
      DRIFT_THRESHOLD: ${DRIFT_THRESHOLD:-0.15}

  edge-sync:
    image: teetinnapop/actions:cognibrew-cloud-edge-sync-latest
    container_name: cognibrew-edge-sync
    <<: *fastapi-common
    environment:
      ENVIRONMENT: production
      API_PREFIX_STR: /api/v1
      PROJECT_NAME: CogniBrew Edge Sync
      CONFIDENCE_TUNING_URL: http://confidence-tuning:8000
      VECTOR_OPERATION_URL: http://vector-operation:8000
      SYNC_PAGE_SIZE: 50

  inference-server:
    image: teetinnapop/actions:cognibrew-inference-server-latest
    container_name: cognibrew-inference-server
    <<: *fastapi-common
    ports:
      - "8010:8000"
    environment:
      LOG_LEVEL: INFO
      MODEL_FRAMEWORK: ${MODEL_FRAMEWORK:-insightface}
      MODEL_NAME: ${MODEL_NAME:-buffalo_sc}

networks:
  cognibrew-cloud:
    external: true
