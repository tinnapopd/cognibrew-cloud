{{- if .Values.edgeSync.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cognibrew-app.edge-sync.fullname" . }}
  labels:
    {{- include "cognibrew-app.componentLabels" (dict "ctx" . "component" "edge-sync") | nindent 4 }}
spec:
  type: {{ .Values.edgeSync.service.type }}
  ports:
    - port: {{ .Values.edgeSync.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cognibrew-app.componentSelectorLabels" (dict "ctx" . "component" "edge-sync") | nindent 4 }}
{{- end }}
