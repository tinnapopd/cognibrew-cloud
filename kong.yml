_format_version: "3.0"
services:
  - name: edge-gateway
    url: http://edge-gateway:8000
    routes:
      - name: gateway-route
        paths:
          - /gateway
        strip_path: true
        preserve_host: true

  - name: edge-sync
    url: http://edge-sync:8000
    routes:
      - name: sync-route
        paths:
          - /sync
        strip_path: true
        preserve_host: true

  - name: airflow
    url: http://airflow-apiserver:8080
    routes:
      - name: airflow-route
        paths:
          - /airflow
        strip_path: true
        preserve_host: true
